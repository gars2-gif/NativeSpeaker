<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0f1318"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Langue Natif</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0f1318;color:#e0dcd0;font-family:Georgia,serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
.page{display:none;flex-direction:column;height:100%;overflow:hidden}
.page.on{display:flex}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1a2636;border-radius:2px}

/* shared */
input,textarea{background:#1e2a38;border:1px solid #2a3a4e;border-radius:10px;padding:11px 13px;color:#e0dcd0;font-size:15px;font-family:sans-serif;width:100%;outline:none}
input:focus,textarea:focus{border-color:#4a9de0}
textarea{resize:none;line-height:1.5;font-family:Georgia,serif}
.btn{padding:13px;border:none;border-radius:11px;font-size:15px;font-family:sans-serif;cursor:pointer;width:100%;font-weight:600;margin-bottom:8px}
.blue{background:linear-gradient(135deg,#1e5898,#0e3060);color:#fff}
.grey{background:rgba(255,255,255,.06);border:1px solid #1e2a3a;color:#6a7a8a;font-size:13px}

/* STATUS BAR */
#status{font-size:12px;font-family:sans-serif;text-align:center;padding:5px 12px;min-height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;display:none}
#status.show{display:flex}
#status.ok{background:rgba(80,180,80,.12);color:#60c060}
#status.err{background:rgba(200,60,60,.18);color:#e06060}
#status.info{background:rgba(74,157,224,.1);color:#4a9de0}

/* KEY */
#p-key{align-items:center;justify-content:center;padding:24px 18px}
.card{width:100%;max-width:420px;background:#141c26;border:1px solid #1e2a3a;border-radius:16px;padding:24px 20px;display:flex;flex-direction:column;gap:13px}
.card h1{font-size:1.4rem;font-weight:400}
.card p{font-size:13px;color:#6a7a8a;line-height:1.75;font-family:sans-serif}
.card a{color:#4a9de0}

/* SETUP */
#p-setup{background:#0f1318}
.si{flex:1;padding:24px 18px;display:flex;flex-direction:column;gap:16px;max-width:500px;width:100%;margin:0 auto}
.lbl{font-size:10px;letter-spacing:.2em;color:#2a3a4a;text-transform:uppercase;font-family:sans-serif;margin-bottom:7px}
.lang-row{display:flex;flex-direction:column;gap:6px}
.lang-btn{display:flex;align-items:center;gap:10px;padding:10px 13px;background:rgba(255,255,255,.03);border:1px solid #1e2a3a;border-radius:9px;cursor:pointer;text-align:left;width:100%}
.lang-btn.sel{background:rgba(74,157,224,.1);border-color:#4a9de0}
.lvl-row{display:flex;gap:7px}
.lvl-btn{flex:1;padding:9px 4px;text-align:center;background:rgba(255,255,255,.03);border:1px solid #1e2a3a;border-radius:8px;cursor:pointer;font-size:12px;font-family:sans-serif;font-weight:600;color:#6a7a8a}
.lvl-btn.sel{background:rgba(74,157,224,.1);border-color:#4a9de0;color:#4a9de0}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.chip{padding:5px 11px;background:rgba(255,255,255,.03);border:1px solid #1e2a3a;border-radius:16px;cursor:pointer;font-size:12px;font-family:sans-serif;color:#6a7a8a}
.chip.sel{background:rgba(74,157,224,.1);border-color:#4a9de0;color:#4a9de0}

/* CHAT */
#p-chat{background:#0f1318}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid #1e2a3a;background:rgba(8,12,18,.96);flex-shrink:0}
#ctx-bar{padding:6px 13px;background:rgba(160,130,50,.07);border-bottom:1px solid rgba(160,130,50,.15);font-size:11px;color:#9a8040;font-family:sans-serif;font-style:italic;flex-shrink:0;display:none}
#msgs{flex:1;padding:14px 13px;display:flex;flex-direction:column;gap:13px}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3878c0,#1a4070);display:flex;align-items:center;justify-content:center;font-size:13px;font-family:sans-serif;font-weight:700;color:#fff;flex-shrink:0}
.bbl-n{background:rgba(56,120,192,.08);border:1px solid rgba(56,120,192,.18);border-radius:4px 13px 13px 13px;padding:10px 13px;color:#e0dcd0;font-size:15px;line-height:1.75}
.bbl-u{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:13px 13px 4px 13px;padding:10px 13px;color:#989490;font-size:14px;line-height:1.6;max-width:76%;font-style:italic}
.bbl-err{background:rgba(200,60,60,.1);border:1px solid rgba(200,60,60,.25);border-radius:8px;padding:10px 12px;color:#e06060;font-size:12px;font-family:sans-serif;line-height:1.55}
.bbl-raw{background:rgba(100,100,60,.1);border:1px solid rgba(180,160,60,.25);border-radius:8px;padding:10px 12px;color:#c8b860;font-size:11px;font-family:monospace;line-height:1.5;word-break:break-all}
.tr{font-size:12px;font-family:sans-serif;font-style:italic;color:#2a3a4a;margin-top:4px}
.spkbtn{display:inline-flex;align-items:center;gap:4px;margin-top:6px;background:rgba(56,120,192,.08);border:1px solid rgba(56,120,192,.2);border-radius:16px;padding:4px 11px;cursor:pointer;font-size:12px;font-family:sans-serif;color:#4a9de0}
.spkbtn.on{background:rgba(56,120,192,.22)}
.notes{margin-top:7px;background:rgba(6,12,20,.96);border:1px solid #182030;border-radius:9px;overflow:hidden}
.nh{padding:4px 10px;border-bottom:1px solid #101820;font-size:9px;letter-spacing:.15em;color:#243650;text-transform:uppercase;font-family:sans-serif}
.nr{padding:7px 10px;border-bottom:1px solid #0c1418;display:flex;gap:7px}
.nr:last-child{border-bottom:none}
.nw{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px}
.no{font-family:sans-serif;font-size:13px;text-decoration:line-through;color:#c08030;opacity:.85}
.nf{font-family:sans-serif;font-size:13px;font-weight:600;color:#58c060}
.ne{font-family:sans-serif;font-size:11px;color:#384858;line-height:1.5}
.enc{padding:5px 10px;font-size:11px;font-family:sans-serif;font-style:italic;color:#406070}
.dots-row{display:flex;gap:9px;align-items:center}
.dots{display:flex;gap:4px;padding:10px 14px;background:rgba(56,120,192,.08);border:1px solid rgba(56,120,192,.15);border-radius:4px 13px 13px 13px}
.dot{width:6px;height:6px;border-radius:50%;background:#4a9de0}

/* INPUT */
#iz{flex-shrink:0;border-top:1px solid #1e2a3a;background:rgba(6,10,16,.96);padding:9px 13px 16px;display:flex;flex-direction:column;gap:8px;align-items:center}
#live{min-height:15px;font-size:13px;font-family:sans-serif;font-style:italic;color:#386888;text-align:center;width:100%;opacity:0;transition:opacity .2s}
.irow{display:flex;gap:8px;width:100%;align-items:flex-end}
#ti{flex:1;min-height:40px;max-height:88px;line-height:1.45;padding:9px 12px;border-radius:11px}
#bs{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,#1e5898,#0e3060);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#bs:disabled{background:rgba(20,30,46,.8);color:#2a3a4a;cursor:not-allowed}
#mw{position:relative;display:flex;align-items:center;justify-content:center}
.ring{position:absolute;width:56px;height:56px;border-radius:50%;border:2px solid rgba(190,50,50,.22);pointer-events:none;animation:rp 1.6s ease infinite}
.ring2{animation-delay:.65s}
#bm{width:56px;height:56px;border-radius:50%;border:none;font-size:22px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center}
#bm.idle{background:linear-gradient(135deg,#184878,#0c2848);box-shadow:0 0 0 3px rgba(74,157,224,.15)}
#bm.listening{background:linear-gradient(135deg,#b02828,#7a1818);animation:mg .9s ease infinite}
#bm.off{background:rgba(18,26,38,.8);cursor:not-allowed}
#mh{font-size:11px;font-family:sans-serif;color:#2a3a4a;text-align:center}

@keyframes rp{0%{transform:scale(1);opacity:.4}100%{transform:scale(2.6);opacity:0}}
@keyframes mg{0%,100%{box-shadow:0 0 0 3px rgba(176,40,40,.18)}50%{box-shadow:0 0 0 8px rgba(176,40,40,.06)}}
@keyframes dt{0%,80%,100%{transform:scale(.5);opacity:.15}40%{transform:scale(1);opacity:1}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .25s ease forwards}
</style>
</head>
<body>
<div id="app">

<!-- KEY -->
<div id="p-key" class="page on">
  <div id="status"></div>
  <div class="card" style="margin-top:-20px">
    <div>
      <div style="font-size:10px;letter-spacing:.2em;color:#2a4060;text-transform:uppercase;font-family:sans-serif;margin-bottom:10px">Langue Natif</div>
      <h1>Bienvenue</h1>
    </div>
    <p>Entrez votre <strong>cle API Anthropic</strong>.<br>
    Obtenez-en une sur <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> et ajoutez un moyen de paiement.</p>
    <input id="ki" type="password" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false"/>
    <button class="btn blue" onclick="saveKey()">Continuer</button>
    <button class="btn grey" onclick="testKey()">Tester la cle</button>
    <button onclick="localStorage.removeItem('nk');location.reload()" style="background:none;border:none;color:#2a3a4a;font-size:11px;font-family:sans-serif;cursor:pointer;text-decoration:underline;align-self:center">Supprimer la cle enregistree</button>
  </div>
</div>

<!-- SETUP -->
<div id="p-setup" class="page">
  <div class="si scroll">
    <div>
      <div style="font-size:10px;letter-spacing:.2em;color:#2a4060;text-transform:uppercase;font-family:sans-serif;margin-bottom:10px">Langue Natif</div>
      <h1 style="font-size:1.7rem;font-weight:400;line-height:1.2">Parlez comme<br><em style="color:#4a9de0">un natif</em></h1>
    </div>
    <div><div class="lbl">Langue</div><div class="lang-row" id="ll"></div></div>
    <div><div class="lbl">Niveau</div><div class="lvl-row" id="lr"></div></div>
    <div>
      <div class="lbl">Jeu de role <span style="color:#182030;font-weight:400">(facultatif)</span></div>
      <div class="chips" id="ch"></div>
      <textarea id="sctx" rows="3" placeholder="Decrivez le contexte..."></textarea>
    </div>
    <button class="btn blue" onclick="startChat()">Commencer</button>
    <button class="btn grey" onclick="go('p-key')">Changer de cle</button>
  </div>
</div>

<!-- CHAT -->
<div id="p-chat" class="page">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:9px">
      <span id="tf" style="font-size:16px;font-family:sans-serif"></span>
      <div>
        <div id="tn" style="font-size:13px;font-family:sans-serif;font-weight:600;color:#c8c4bc"></div>
        <div id="ts" style="font-size:10px;font-family:sans-serif;color:#2a3a4a"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:7px">
      <div id="step" style="font-size:10px;font-family:sans-serif;color:#2a4060;text-align:right"></div>
      <button onclick="goSetup()" style="background:none;border:1px solid #1e2a3a;color:#2a3a4a;border-radius:7px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:sans-serif">Changer</button>
    </div>
  </div>
  <div id="ctx-bar"></div>
  <div id="msgs" class="scroll"></div>
  <div id="iz">
    <div id="live"></div>
    <div class="irow">
      <textarea id="ti" rows="1" placeholder="Ecrivez ici..." oninput="resize(this);syncBtn()" onkeydown="onKey(event)"></textarea>
      <button id="bs" onclick="sendText()" disabled>&#8593;</button>
    </div>
    <div id="mw"><button id="bm" class="idle" onclick="toggleMic()">&#127897;&#65039;</button></div>
    <div id="mh">Appuyez pour parler</div>
  </div>
</div>

</div>
<script>
var LANGS = [
  {code:"it",name:"Italiano",  flag:"🇮🇹",native:"Marco",  city:"Roma",     sr:"it-IT",tts:"it-IT"},
  {code:"es",name:"Espanol",   flag:"🇪🇸",native:"Sofia",  city:"Madrid",   sr:"es-ES",tts:"es-ES"},
  {code:"en",name:"English",   flag:"🇬🇧",native:"James",  city:"London",   sr:"en-GB",tts:"en-GB"},
  {code:"de",name:"Deutsch",   flag:"🇩🇪",native:"Anna",   city:"Berlin",   sr:"de-DE",tts:"de-DE"},
  {code:"pt",name:"Portugues", flag:"🇧🇷",native:"Isabela",city:"Sao Paulo",sr:"pt-BR",tts:"pt-BR"},
];
var LEVELS = [{id:"beginner",l:"Debutant"},{id:"intermediate",l:"Intermediaire"},{id:"advanced",l:"Avance"}];
var SCENS  = [
  {e:"Restaurant",t:"Nous sommes dans un restaurant. Tu es serveur, je suis touriste."},
  {e:"Cafe",      t:"Au cafe entre amis, conversation detendue."},
  {e:"Marche",    t:"Tu es vendeur au marche. Je veux acheter et discuter."},
  {e:"Taxi",      t:"Tu es chauffeur de taxi. On discute pendant le trajet."},
  {e:"Entretien", t:"Tu es recruteur. Tu menes un entretien d embauche."},
  {e:"Libre",     t:""},
];

var apiKey="", selLang=LANGS[0], selLevel="intermediate", scenario="";
var convo=[], busy=false;
var recState="idle", rec=null, finalT="";
var playId=null, kaTimer=null, msgStore={};

window.addEventListener("DOMContentLoaded",function(){
  apiKey=localStorage.getItem("nk")||"";
  buildUI();
  if(apiKey) go("p-setup");
  try{window.speechSynthesis&&speechSynthesis.getVoices();}catch(e){}
});

function buildUI(){
  var ll=document.getElementById("ll"); ll.innerHTML="";
  LANGS.forEach(function(l){
    var b=document.createElement("button"); b.className="lang-btn"+(l.code===selLang.code?" sel":"");
    var fl=document.createElement("span"); fl.style.cssText="font-size:22px;flex-shrink:0"; fl.textContent=l.flag;
    var n=document.createElement("span"); n.style.cssText="font-family:sans-serif;font-size:14px;font-weight:600;color:"+(l.code===selLang.code?"#4a9de0":"#c8c4bc");
    n.textContent=l.name;
    var s=document.createElement("span"); s.style.cssText="font-family:sans-serif;font-size:11px;color:#2a3848;margin-left:6px";
    s.textContent="avec "+l.native;
    b.appendChild(fl); b.appendChild(n); b.appendChild(s);
    if(l.code===selLang.code){var c=document.createElement("span");c.style.cssText="margin-left:auto;color:#4a9de0";c.textContent="v";b.appendChild(c);}
    b.addEventListener("click",function(){selLang=l;buildUI();});
    ll.appendChild(b);
  });
  var lr=document.getElementById("lr"); lr.innerHTML="";
  LEVELS.forEach(function(lv){
    var b=document.createElement("button"); b.className="lvl-btn"+(lv.id===selLevel?" sel":"");
    b.textContent=lv.l;
    b.addEventListener("click",function(){selLevel=lv.id;buildUI();});
    lr.appendChild(b);
  });
  var ch=document.getElementById("ch"); ch.innerHTML="";
  SCENS.forEach(function(s){
    var c=document.createElement("div"); c.className="chip"+(scenario===s.t&&s.t?"  sel":"");
    c.textContent=s.e;
    c.addEventListener("click",function(){scenario=s.t;document.getElementById("sctx").value=s.t;buildUI();});
    ch.appendChild(c);
  });
}

// KEY
function saveKey(){
  var k=(document.getElementById("ki").value||"").trim();
  if(!k){setStatus("Entrez votre cle","err");return;}
  apiKey=k; localStorage.setItem("nk",k);
  go("p-setup");
}

async function testKey(){
  var k=(document.getElementById("ki").value||"").trim();
  if(!k){setStatus("Entrez d abord la cle","err");return;}
  setStatus("Test en cours...","info");
  try{
    var r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:5,messages:[{role:"user",content:"Hi"}]})
    });
    var d=await r.json();
    if(d.error) setStatus("Erreur: "+d.error.message,"err");
    else setStatus("Cle valide! Vous pouvez continuer.","ok");
  }catch(e){setStatus("Erreur reseau: "+e.message,"err");}
}

function setStatus(msg,type){
  var s=document.getElementById("status");
  s.textContent=msg; s.className="show "+(type||"info");
}

// SETUP -> CHAT
function startChat(){
  var scText=(document.getElementById("sctx").value||"").trim();
  if(scText) scenario=scText;
  convo=[]; Object.keys(msgStore).forEach(function(k){delete msgStore[k];});
  document.getElementById("msgs").innerHTML="";
  document.getElementById("tf").textContent=selLang.flag;
  document.getElementById("tn").textContent=selLang.native+" - "+selLang.city;
  document.getElementById("ts").textContent=LEVELS.find(function(l){return l.id===selLevel;}).l+(scenario?" - Role":"");
  var cb=document.getElementById("ctx-bar");
  if(scenario){cb.textContent=scenario;cb.style.display="";}else{cb.style.display="none";}
  go("p-chat");
  callAPI("__init__");
}

function goSetup(){
  stopSpeak(); try{if(rec)rec.stop();}catch(e){}
  convo=[]; go("p-setup");
}

// SYSTEM PROMPT
function makeSystem(){
  var ctx=scenario?" ROLEPLAY: "+scenario+" Stay in character.":"";
  return "You are "+selLang.native+", a native "+selLang.name+" speaker from "+selLang.city+"."+ctx+
    " Converse naturally with a French learner at "+selLevel+" level."+
    " CRITICAL: Reply with ONLY a JSON object. No text before or after. No markdown. No backticks. Just JSON."+
    " Format: {\"reply\":\"your response in "+selLang.name+"\",\"translation\":\"french translation\",\"corrections\":[],\"pronunciation_tips\":[],\"encouragement\":\"\"}"+
    " Keep reply to 1-3 short spoken sentences. corrections and pronunciation_tips are arrays of correction objects.";
}

// EXTRACT JSON from response (very permissive)
function parseReply(text){
  // Try 1: direct
  try{return JSON.parse(text);}catch(e){}
  // Try 2: strip markdown
  var t2=text.replace(/^```[a-z]*\s*/i,"").replace(/\s*```$/,"").trim();
  try{return JSON.parse(t2);}catch(e){}
  // Try 3: find first { last }
  var i=text.indexOf("{"), j=text.lastIndexOf("}");
  if(i>=0&&j>i){try{return JSON.parse(text.slice(i,j+1));}catch(e){}}
  return null;
}

// MAIN API CALL
async function callAPI(userText){
  if(busy) return;
  busy=true;

  // Build message (skip __init__ from user history display)
  var content=userText==="__init__"
    ?"You are starting. Greet the user and ask a simple opening question. Set corrections:[] and pronunciation_tips:[] and encouragement:\"\"."
    :userText;

  convo.push({role:"user",content:content});
  setStep("Envoi...");
  showThinking(true);

  try{
    setStep("Appel API...");
    var r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:800,
        system:makeSystem(),
        messages:convo
      })
    });

    setStep("Lecture reponse (HTTP "+r.status+")...");

    if(!r.ok){
      var errText=await r.text();
      throw new Error("HTTP "+r.status+": "+errText.substring(0,200));
    }

    var data=await r.json();
    if(data.error) throw new Error(data.error.message);

    var rawText=(data.content||[]).map(function(b){return b.type==="text"?b.text:"";}).join("");
    setStep("Parsing...");
    console.log("RAW:",rawText);

    var parsed=parseReply(rawText);

    if(!parsed){
      // Show the raw response so user can see what's happening
      showThinking(false);
      addRawMsg("Reponse non-JSON recu:\n"+rawText.substring(0,400));
      setStep("Erreur JSON");
      busy=false; return;
    }

    if(!parsed.reply){
      showThinking(false);
      addRawMsg("Champ reply absent. JSON recu: "+JSON.stringify(parsed).substring(0,300));
      setStep("Erreur reply");
      busy=false; return;
    }

    convo.push({role:"assistant",content:rawText});
    var id="m"+Date.now();
    msgStore[id]=parsed.reply;
    showThinking(false);
    addNativeMsg(parsed,id);
    setStep("");

  }catch(e){
    showThinking(false);
    console.error("callAPI error:",e);
    addErrMsg(e.message);
    setStep("Erreur");
  }

  busy=false;
}

// MESSAGES
function addNativeMsg(p,id){
  var msgs=document.getElementById("msgs");
  var row=document.createElement("div"); row.className="fi"; row.style.cssText="display:flex;gap:9px;align-items:flex-start";
  var av=document.createElement("div"); av.className="av"; av.textContent=selLang.native[0];
  var right=document.createElement("div"); right.style.cssText="flex:1;min-width:0";

  var bbl=document.createElement("div"); bbl.className="bbl-n"; bbl.textContent=p.reply;
  var spk=document.createElement("button"); spk.className="spkbtn"; spk.id="spk-"+id; spk.textContent="Ecouter";
  (function(mid){spk.addEventListener("click",function(){handleSpeak(mid);});})(id);
  right.appendChild(bbl); right.appendChild(spk);

  if(p.translation){var tr=document.createElement("div");tr.className="tr";tr.textContent=p.translation;right.appendChild(tr);}

  var hasN=(p.corrections&&p.corrections.length)||(p.pronunciation_tips&&p.pronunciation_tips.length);
  if(hasN){
    var notes=document.createElement("div"); notes.className="notes";
    var nh=document.createElement("div"); nh.className="nh"; nh.textContent="Notes"; notes.appendChild(nh);
    (p.corrections||[]).forEach(function(c){
      var r=document.createElement("div"); r.className="nr";
      var ico=document.createElement("span"); ico.style.cssText="font-size:11px;font-family:sans-serif;font-weight:700;color:#c08030;flex-shrink:0";
      ico.textContent=({grammaire:"Gr",vocabulaire:"Vo",orthographe:"Or"}[c.type]||"?")+" ";
      var body=document.createElement("div");
      var wds=document.createElement("div"); wds.className="nw";
      var o=document.createElement("span");o.className="no";o.textContent=c.original;
      var a=document.createElement("span");a.style.cssText="color:#2a3a4a;font-size:10px";a.textContent=" > ";
      var f=document.createElement("span");f.className="nf";f.textContent=c.corrected;
      wds.appendChild(o);wds.appendChild(a);wds.appendChild(f);
      var ex=document.createElement("div");ex.className="ne";ex.textContent=c.explanation;
      body.appendChild(wds);body.appendChild(ex);
      r.appendChild(ico);r.appendChild(body);notes.appendChild(r);
    });
    (p.pronunciation_tips||[]).forEach(function(pt){
      var r=document.createElement("div"); r.className="nr";
      var ico=document.createElement("span"); ico.style.cssText="font-size:11px;font-family:sans-serif;color:#6070b0;flex-shrink:0;font-weight:700"; ico.textContent="Son ";
      var body=document.createElement("div");
      var wds=document.createElement("div"); wds.className="nw";
      var w=document.createElement("span");w.style.cssText="font-family:sans-serif;font-size:13px;font-weight:600;color:#a0a8c0";w.textContent=pt.word;
      var a=document.createElement("span");a.style.cssText="color:#2a3a4a;font-size:10px";a.textContent=" > ";
      var ph=document.createElement("span");ph.style.cssText="font-family:sans-serif;font-size:13px;font-style:italic;color:#6878b8";ph.textContent=pt.phonetic;
      wds.appendChild(w);wds.appendChild(a);wds.appendChild(ph);
      var tip=document.createElement("div");tip.className="ne";tip.textContent=pt.tip;
      body.appendChild(wds);body.appendChild(tip);
      r.appendChild(ico);r.appendChild(body);notes.appendChild(r);
    });
    if(p.encouragement){var enc=document.createElement("div");enc.className="enc";enc.textContent=p.encouragement;notes.appendChild(enc);}
    right.appendChild(notes);
  }

  row.appendChild(av); row.appendChild(right);
  msgs.appendChild(row);
  row.scrollIntoView({behavior:"smooth",block:"end"});
}

function addUserMsg(text){
  var msgs=document.getElementById("msgs");
  var wrap=document.createElement("div"); wrap.className="fi"; wrap.style.cssText="display:flex;justify-content:flex-end";
  var b=document.createElement("div"); b.className="bbl-u"; b.textContent=text;
  wrap.appendChild(b); msgs.appendChild(wrap);
  wrap.scrollIntoView({behavior:"smooth",block:"end"});
}

function addErrMsg(msg){
  var msgs=document.getElementById("msgs");
  var d=document.createElement("div"); d.className="bbl-err fi";
  d.textContent="Erreur: "+msg;
  msgs.appendChild(d);
  d.scrollIntoView({behavior:"smooth",block:"end"});
}

function addRawMsg(text){
  var msgs=document.getElementById("msgs");
  var d=document.createElement("div"); d.className="bbl-raw fi";
  d.textContent=text;
  msgs.appendChild(d);
  d.scrollIntoView({behavior:"smooth",block:"end"});
}

var thinkEl=null;
function showThinking(on){
  var msgs=document.getElementById("msgs");
  if(on&&!thinkEl){
    thinkEl=document.createElement("div"); thinkEl.className="dots-row fi";
    var av=document.createElement("div"); av.className="av"; av.textContent=selLang.native[0];
    var dots=document.createElement("div"); dots.className="dots";
    [0,.18,.36].forEach(function(d){var dot=document.createElement("div");dot.className="dot";dot.style.animation="dt 1.2s ease "+d+"s infinite";dots.appendChild(dot);});
    thinkEl.appendChild(av); thinkEl.appendChild(dots);
    msgs.appendChild(thinkEl);
    thinkEl.scrollIntoView({behavior:"smooth",block:"end"});
  } else if(!on&&thinkEl){thinkEl.remove();thinkEl=null;}
  var bm=document.getElementById("bm");
  bm.className=on?"off":(recState==="listening"?"listening":"idle");
  bm.disabled=on;
  syncBtn();
}

function setStep(txt){document.getElementById("step").textContent=txt;}

// TEXT INPUT
function sendText(){
  var ta=document.getElementById("ti"); var t=ta.value.trim();
  if(!t||busy)return;
  ta.value=""; resize(ta); syncBtn();
  addUserMsg(t); callAPI(t);
}
function syncBtn(){document.getElementById("bs").disabled=!document.getElementById("ti").value.trim()||busy;}
function resize(ta){ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,88)+"px";}
function onKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendText();}}

// TTS
function handleSpeak(id){
  var text=msgStore[id]||""; if(!text)return;
  if(playId===id){stopSpeak();return;}
  stopSpeak();
  try{
    if(!window.speechSynthesis){addErrMsg("TTS non disponible");return;}
    var go=function(voices){
      var u=new SpeechSynthesisUtterance(text);
      u.lang=selLang.tts; u.rate=0.88; u.pitch=1;
      var base=selLang.tts.split("-")[0];
      var v=voices.find(function(v){return v.lang===selLang.tts;})||voices.find(function(v){return v.lang.startsWith(base);});
      if(v)u.voice=v;
      var done=false;
      var fin=function(){if(done)return;done=true;clearInterval(kaTimer);setPlayId(null);};
      var fb=setTimeout(fin,Math.max(text.split(/\s+/).length*420,2500));
      u.onend=function(){clearTimeout(fb);fin();};
      u.onerror=function(){clearTimeout(fb);fin();};
      kaTimer=setInterval(function(){if(!speechSynthesis.speaking){clearInterval(kaTimer);return;}speechSynthesis.pause();speechSynthesis.resume();},10000);
      setPlayId(id); setTimeout(function(){speechSynthesis.speak(u);},50);
    };
    var vs=speechSynthesis.getVoices();
    if(vs.length)go(vs); else{speechSynthesis.onvoiceschanged=function(){go(speechSynthesis.getVoices());};}
  }catch(e){addErrMsg("TTS: "+e.message);}
}
function stopSpeak(){try{clearInterval(kaTimer);window.speechSynthesis&&speechSynthesis.cancel();}catch(e){}setPlayId(null);}
function setPlayId(id){
  if(playId){var b=document.getElementById("spk-"+playId);if(b){b.textContent="Ecouter";b.classList.remove("on");}}
  playId=id;
  if(id){var b=document.getElementById("spk-"+id);if(b){b.textContent="Stop";b.classList.add("on");}}
}

// STT
function toggleMic(){
  if(busy)return;
  if(recState==="listening"){try{rec.stop();}catch(e){}return;}
  navigator.mediaDevices.getUserMedia({audio:true})
  .then(function(stream){stream.getTracks().forEach(function(t){t.stop();});startRec();})
  .catch(function(e){addErrMsg("Micro refuse: "+e.name);});
}
function startRec(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addErrMsg("Reconnaissance vocale non disponible. Utilisez Chrome.");return;}
  try{
    rec=new SR(); rec.lang=selLang.sr; rec.interimResults=true; rec.continuous=false;
    finalT=""; setLive("",false);
    rec.onstart=function(){setRS("listening");};
    rec.onresult=function(e){
      var interim="",fin="";
      for(var i=0;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}
      if(fin)finalT=fin; setLive(fin||interim,true);
    };
    rec.onend=function(){
      setRS("idle"); setLive("",false);
      var t=finalT.trim();
      if(t){addUserMsg(t);callAPI(t);}
    };
    rec.onerror=function(e){setRS("idle");setLive("",false);if(e.error!=="aborted"&&e.error!=="no-speech")addErrMsg("Micro: "+e.error);};
    rec.start();
  }catch(e){addErrMsg("Demarrage micro: "+e.message);setRS("idle");}
}
function setRS(s){
  recState=s;
  var bm=document.getElementById("bm"); bm.className=busy?"off":s;
  document.getElementById("mh").textContent=s==="listening"?"En cours... (appuyez pour arreter)":"Appuyez pour parler";
  document.getElementById("mh").style.color=s==="listening"?"#a03030":"#2a3a4a";
  var mw=document.getElementById("mw"); mw.querySelectorAll(".ring").forEach(function(r){r.remove();});
  if(s==="listening"){var r1=document.createElement("div");r1.className="ring";var r2=document.createElement("div");r2.className="ring ring2";mw.insertBefore(r2,mw.firstChild);mw.insertBefore(r1,mw.firstChild);}
}

// UTILS
function go(id){document.querySelectorAll(".page").forEach(function(p){p.classList.remove("on");});document.getElementById(id).classList.add("on");}
function setLive(t,show){var el=document.getElementById("live");el.textContent=t||"...";el.style.opacity=show?"1":"0";}
</script>
