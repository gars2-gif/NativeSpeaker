<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0f1318"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Langue Natif</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="app">

<!-- ═══════════════════════════════════════════════════════ KEY PAGE ══ -->
<div id="p-key" class="page on">
  <div id="status"></div>
  <div class="card" style="margin-top:-20px">
    <div>
      <div style="font-size:10px;letter-spacing:.2em;color:#2a4060;text-transform:uppercase;font-family:sans-serif;margin-bottom:10px">Langue Natif</div>
      <h1>Bienvenue</h1>
    </div>
    <p>Entrez votre <strong>cle API Anthropic</strong>.<br>
    Obtenez-en une sur <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> et ajoutez un moyen de paiement.</p>
    <input id="ki" type="password" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false"/>
    <button id="btn-save-key" class="btn blue">Continuer</button>
    <button id="btn-test-key" class="btn grey">Tester la cle</button>
    <button id="btn-delete-key" style="background:none;border:none;color:#2a3a4a;font-size:11px;font-family:sans-serif;cursor:pointer;text-decoration:underline;align-self:center">Supprimer la cle enregistree</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════ SETUP PAGE ══ -->
<div id="p-setup" class="page">
  <div style="display:flex;justify-content:flex-end;align-items:center;padding:8px 13px;border-bottom:1px solid #1e2a3a;background:rgba(8,12,18,.96);flex-shrink:0">
    <button id="settings-btn-setup" style="background:none;border:1px solid #1e2a3a;color:#8090a0;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:13px;font-family:sans-serif;line-height:1">&#9881;</button>
  </div>
  <div id="settings-panel-setup" class="settings-panel">
    <div>
      <div class="set-group-label">Son</div>
      <div id="set-mute2" class="set-group"></div>
    </div>
    <div>
      <div class="set-group-label">Vitesse de voix</div>
      <div id="set-speed2" class="set-group"></div>
    </div>
    <div>
      <div class="set-group-label">Taille du texte</div>
      <div id="set-fontsize2" class="set-group"></div>
    </div>
  </div>
  <div class="si scroll">
    <div>
      <div style="font-size:10px;letter-spacing:.2em;color:#2a4060;text-transform:uppercase;font-family:sans-serif;margin-bottom:10px">Langue Natif</div>
      <h1 style="font-size:1.7rem;font-weight:400;line-height:1.2">Parlez comme<br><em style="color:#4a9de0">un natif</em></h1>
    </div>
    <div><div class="lbl">Langue</div><div class="lang-row" id="ll"></div></div>
    <div><div class="lbl">Niveau</div><div class="lvl-row" id="lr"></div></div>
    <div>
      <div class="lbl">Jeu de role <span style="color:#182030;font-weight:400">(facultatif)</span></div>
      <div class="chips" id="ch"></div>
      <textarea id="sctx" rows="3" placeholder="Decrivez le contexte..."></textarea>
    </div>
    <button id="btn-start-chat" class="btn blue">Commencer</button>
    <button id="btn-change-key" class="btn grey">Changer de cle</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ CHAT PAGE ══ -->
<div id="p-chat" class="page">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:9px">
      <span id="tf" style="font-size:16px;font-family:sans-serif"></span>
      <div>
        <div id="tn" style="font-size:13px;font-family:sans-serif;font-weight:600;color:#c8c4bc"></div>
        <div id="ts" style="font-size:10px;font-family:sans-serif;color:#2a3a4a"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:7px">
      <div id="step" style="font-size:10px;font-family:sans-serif;color:#2a4060;text-align:right"></div>
      <button id="settings-btn" style="background:none;border:1px solid #1e2a3a;color:#8090a0;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:13px;font-family:sans-serif;line-height:1">&#9881;</button>
      <button id="btn-gosetup" style="background:none;border:1px solid #1e2a3a;color:#8090a0;border-radius:7px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:sans-serif">Changer</button>
    </div>
  </div>
  <div id="settings-panel" class="settings-panel">
    <div>
      <div class="set-group-label">Son</div>
      <div id="set-mute" class="set-group"></div>
    </div>
    <div>
      <div class="set-group-label">Vitesse de voix</div>
      <div id="set-speed" class="set-group"></div>
    </div>
    <div>
      <div class="set-group-label">Taille du texte</div>
      <div id="set-fontsize" class="set-group"></div>
    </div>
  </div>
  <div id="ctx-bar"></div>
  <div id="msgs" class="scroll"></div>
  <div id="iz">
    <div id="live"></div>
    <div class="irow">
      <textarea id="ti" rows="1" placeholder="Ecrivez ici..."></textarea>
      <button id="bs" disabled>&#8593;</button>
    </div>
    <div id="mw"><button id="bm" class="idle">&#127897;&#65039;</button></div>
    <div id="mh">Appuyez pour parler</div>
  </div>
</div>

</div>
<!-- ES module — works on GitHub Pages with no build step -->
<script type="module" src="js/app.js"></script>
</body>
</html>
